spring.application.name=honey-do-test

# All backend endpoints are served under /api, matching the frontend's
# Vite dev server proxy (frontend/vite.config.ts).
server.servlet.context-path=/api
server.port=8081

# SQLite database file committed at the project root.
spring.datasource.url=jdbc:sqlite:./honeydo.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Optional, gitignored file for local-only configuration (e.g. SMTP
# credentials, secrets). See README for details.
spring.config.import=optional:file:./application-local.properties

# SMTP configuration (used by EmailService) is intentionally left unset
# here. Provide it in application-local.properties to enable outgoing
# email, e.g.:
#   spring.mail.host=smtp.example.com
#   spring.mail.port=587
#   spring.mail.username=user@example.com
#   spring.mail.password=changeme
#   spring.mail.properties.mail.smtp.auth=true
#   spring.mail.properties.mail.smtp.starttls.enable=true

# JWT signing secret (HS256, base64-encoded) and access token lifetime.
# This default is fine for local dev only - override via
# application-local.properties for any non-local environment.
jwt.secret=bZiUSJmRtqZMmLUlpwsAEKczXFEkMqt8BUl0K1dFQNA=
jwt.expiration-ms=86400000

# Base URL of the frontend, used to build invitation links sent via email.
app.frontend-url=http://localhost:3002
