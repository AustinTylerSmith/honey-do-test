spring.application.name=honey-do-test

# In-memory SQLite shared via a single pooled connection so Flyway's
# migrations and the app's queries see the same database for the
# lifetime of the test context.
spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

